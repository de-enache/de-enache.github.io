<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic Page Needs -->
  <meta charset="utf-8">
  <title>Skeleton CSS Style Guide</title>
  <meta name="description" content="A preview page for CSS formatting">
  <meta name="author" content="">

  <!-- Mobile Specific Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- FONT -->
  <link href="//fonts.googleapis.com/css?family=Raleway:400,300,600" rel="stylesheet" type="text/css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/skeleton.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/EDE.png">

</head>
<body>

  <div class="container" style="margin-top: 5%">
    <div class="row">
      <div class="twelve columns">
        <h1>Style Guide</h1>
        <p>Use this page to verify the visual consistency of the terminal aesthetic across all components.</p>
        <hr>
      </div>
    </div>

    <!-- Typography -->
    <div class="row">
      <div class="six columns">
        <h2>Typography</h2>
        <h1>Heading H1</h1>
        <h3>Heading H3</h3>
        <h5>Heading H5</h5>
        <p>Standard paragraph with <strong>strong text</strong> and an <a href="#">inline link</a>.</p>
      </div>
      <div class="six columns">
        <h2>Buttons</h2>
        <a class="button" href="#">Standard Button</a>
        <button class="button-primary">Primary Button</button>
        <br>
        <a class="terminal-input" href="#">Terminal Input Link</a>
      </div>
    </div>

    <hr>

    <!-- Forms -->
    <div class="row">
      <div class="twelve columns">
        <h3>Forms</h3>
        <form>
          <div class="row">
            <div class="six columns">
              <label for="exampleEmailInput">Your email</label>
              <input class="u-full-width" type="email" placeholder="test@mailbox.com" id="exampleEmailInput">
            </div>
            <div class="six columns">
              <label for="exampleRecipientInput">Reason for contacting</label>
              <select class="u-full-width" id="exampleRecipientInput">
                <option value="Option 1">Questions</option>
                <option value="Option 2">Admiration</option>
              </select>
            </div>
          </div>
          <label for="exampleMessage">Message</label>
          <textarea class="u-full-width" placeholder="Your encrypted message..." id="exampleMessage"></textarea>
          <input class="button-primary" type="submit" value="Submit Query">
        </form>
      </div>
    </div>

    <hr>

    <!-- Navigation -->
    <div class="row" style="margin-bottom: 5%">
      <div class="twelve columns">
        <a class="terminal-input" href="index.html"><strong>←</strong> Return to Node</a>
      </div>
    </div>
  </div>

  <div class="version-note">v0.01-debug</div>
</body>
</html>
